# docker-compose.yaml, This file is used to run the application locally.

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  counter-backend:
    build:
      context: ./backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: localpassword
      DB_NAME: postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  counter-frontend:
    build:
      context: ./frontend
    ports:
      - "8000:8080" # Mapping local port 8000 to the container's unprivileged 8080
    depends_on:
      - counter-backend