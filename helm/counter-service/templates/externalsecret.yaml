apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rds-credentials-sync
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: rds-credentials
    creationPolicy: Owner
  data:
    - secretKey: password 
      remoteRef:
        key: ehud-counter-service-rds-credentials
        property: password 
    - secretKey: username
      remoteRef:
        key: ehud-counter-service-rds-credentials
        property: username